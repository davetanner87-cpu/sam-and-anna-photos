<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sam & Anna — Wedding Gallery 💍</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --gold: #c9a84c; --dark: #1a1a1a; }
    body { background: #111; color: #fff; font-family: -apple-system, 'Helvetica Neue', sans-serif; min-height: 100vh; }

    header {
      text-align: center; padding: 48px 24px 36px;
      background: var(--dark); border-bottom: 1px solid #222;
      position: sticky; top: 0; z-index: 100;
    }
    header h1 { font-size: 24px; font-weight: 300; letter-spacing: 2px; }
    header h1 strong { font-weight: 700; }
    .gold-rule { width: 48px; height: 2px; background: var(--gold); margin: 12px auto 0; }
    .photo-count { font-size: 12px; color: #555; letter-spacing: 3px; text-transform: uppercase; margin-top: 10px; }

    .upload-btn {
      display: inline-block; margin-top: 16px;
      background: var(--gold); color: #000;
      padding: 10px 24px; font-size: 13px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; text-decoration: none;
      border-radius: 2px;
    }

    /* GRID */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 4px;
      padding: 4px;
    }

    @media (max-width: 600px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .photo-item {
      aspect-ratio: 1; overflow: hidden; background: #1e1e1e;
      position: relative; cursor: pointer;
    }
    .photo-item img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.3s; display: block;
    }
    .photo-item:hover img { transform: scale(1.05); }
    .photo-item .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
      opacity: 0; transition: opacity 0.2s;
      display: flex; align-items: flex-end; padding: 10px;
    }
    .photo-item:hover .overlay { opacity: 1; }
    .photo-name { font-size: 11px; color: rgba(255,255,255,0.8); letter-spacing: 1px; }

    /* LOADING */
    .loading {
      text-align: center; padding: 80px 24px; color: #555;
    }
    .loading .spinner {
      width: 36px; height: 36px; border: 3px solid #222;
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* EMPTY */
    .empty { text-align: center; padding: 100px 24px; color: #444; }
    .empty .icon { font-size: 48px; margin-bottom: 16px; }
    .empty p { font-size: 15px; }

    /* LIGHTBOX */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.95); align-items: center; justify-content: center;
    }
    .lightbox.visible { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; }
    .lightbox-close {
      position: absolute; top: 20px; right: 24px;
      color: #fff; font-size: 32px; cursor: pointer; opacity: 0.7; background: none; border: none;
    }
    .lightbox-close:hover { opacity: 1; }
    .lightbox-name {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      font-size: 12px; color: rgba(255,255,255,0.5); letter-spacing: 2px; text-transform: uppercase;
    }

    /* NEW BADGE */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .photo-item.new { animation: fadeInDown 0.4s ease; }
    .new-badge {
      position: absolute; top: 8px; left: 8px;
      background: var(--gold); color: #000;
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      padding: 3px 8px; font-weight: 700; border-radius: 2px;
    }
  </style>
</head>
<body>

<header>
  <div style="font-size:28px; margin-bottom:8px;">💍</div>
  <h1><strong>Sam & Anna</strong></h1>
  <div class="gold-rule"></div>
  <div class="photo-count" id="photo-count">Loading photos...</div>
  <a href="/" class="upload-btn">+ Add Your Photos</a>
</header>

<div id="gallery-container">
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading photos...</p>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-name" id="lightbox-name"></div>
</div>

<script>
  let knownIds = new Set();
  let isFirstLoad = true;

  async function loadPhotos() {
    try {
      const res = await fetch('/gallery-data');
      const data = await res.json();
      const photos = data.photos || [];

      const count = photos.length;
      document.getElementById('photo-count').textContent = 
        count === 0 ? 'No photos yet — be the first!' : 
        `${count} photo${count !== 1 ? 's' : ''} shared tonight`;

      if (count === 0) {
        document.getElementById('gallery-container').innerHTML = `
          <div class="empty">
            <div class="icon">📷</div>
            <p>No photos yet.<br>Scan the QR code to share yours!</p>
          </div>`;
        return;
      }

      const container = document.getElementById('gallery-container');

      // On first load, render everything
      if (isFirstLoad) {
        container.innerHTML = '<div class="gallery-grid" id="gallery-grid"></div>';
        isFirstLoad = false;
        photos.forEach(photo => {
          knownIds.add(photo.id);
          addPhotoToGrid(photo, false);
        });
        return;
      }

      // On subsequent loads, prepend new photos
      const newPhotos = photos.filter(p => !knownIds.has(p.id));
      newPhotos.forEach(photo => {
        knownIds.add(photo.id);
        addPhotoToGrid(photo, true);
      });

    } catch (err) {
      console.error('Gallery load error:', err);
    }
  }

  function addPhotoToGrid(photo, isNew) {
    const grid = document.getElementById('gallery-grid');
    if (!grid) return;

    const item = document.createElement('div');
    item.className = 'photo-item' + (isNew ? ' new' : '');
    item.dataset.id = photo.id;

    // Extract uploader name from filename (format: "Name - timestamp.ext")
    const uploaderName = photo.name ? photo.name.split(' - ')[0] : 'Guest';

    const thumbnailSrc = photo.thumbnailLink || '';
    
    item.innerHTML = `
      ${isNew ? '<div class="new-badge">New</div>' : ''}
      ${thumbnailSrc ? `<img src="${thumbnailSrc}" alt="${uploaderName}" loading="lazy">` : '<div style="width:100%;height:100%;background:#222;display:flex;align-items:center;justify-content:center;color:#333;font-size:32px;">📷</div>'}
      <div class="overlay"><div class="photo-name">${uploaderName}</div></div>
    `;

    item.addEventListener('click', () => openLightbox(thumbnailSrc, uploaderName));

    if (isNew) {
      grid.insertBefore(item, grid.firstChild);
    } else {
      grid.appendChild(item);
    }

    // Remove "new" badge after 10 seconds
    if (isNew) {
      setTimeout(() => {
        const badge = item.querySelector('.new-badge');
        if (badge) badge.remove();
        item.classList.remove('new');
      }, 10000);
    }
  }

  function openLightbox(src, name) {
    if (!src) return;
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox-name').textContent = `Shared by ${name}`;
    document.getElementById('lightbox').classList.add('visible');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('visible');
    document.getElementById('lightbox-img').src = '';
  }

  // Close lightbox on background click
  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeLightbox();
  });

  // Close on Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeLightbox();
  });

  // Initial load + poll every 15 seconds for new photos
  loadPhotos();
  setInterval(loadPhotos, 15000);
</script>
</body>
</html>
