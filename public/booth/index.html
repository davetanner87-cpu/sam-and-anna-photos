<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Sam & Anna - Photo Booth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    @media print {
      * { visibility: hidden !important; }
      #print-image { visibility: visible !important; position: fixed; inset: 0; width: 100%; height: 100%; object-fit: fill; display: block !important; }
    }
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --dark: #0d0d0d;
      --cream: #faf8f4;
    }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--dark);
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      user-select: none;
    }

    /* ── SCREENS ─────────────────────────────────── */
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .screen.active { opacity: 1; pointer-events: all; }

    /* ── IDLE SCREEN ─────────────────────────────── */
    #screen-idle { background: var(--dark); text-align: center; padding: 20px; overflow: hidden; }
    .idle-rings { font-size: 60px; margin-bottom: 12px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    .idle-title { font-size: 52px; font-weight: 400; color: #fff; letter-spacing: 3px; line-height: 1.1; margin-bottom: 12px; }
    .idle-title strong { font-weight: 400; display: inline; }
    .idle-dates { margin: 12px auto; }
    .idle-date-row { font-size: 13px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin: 6px 0; }
    .idle-date-row span { color: #555; }
    .gold-rule { width: 60px; height: 2px; background: var(--gold); margin: 12px auto; }
    .tap-btn {
      margin-top: 16px;
      background: var(--gold); color: #000;
      font-size: 22px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase;
      border: none; border-radius: 999px;
      padding: 24px 64px; cursor: pointer;
      animation: pulse 2s ease-in-out infinite;
      box-shadow: 0 0 0 0 rgba(201,168,76,0.4);
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(201,168,76,0.4); }
      70% { box-shadow: 0 0 0 24px rgba(201,168,76,0); }
      100% { box-shadow: 0 0 0 0 rgba(201,168,76,0); }
    }
    .idle-sub { font-size: 13px; color: #444; margin-top: 20px; letter-spacing: 2px; text-transform: uppercase; }

    /* ── CAMERA SCREEN ───────────────────────────── */
    #screen-camera { background: #000; }
    #video {
      width: 100%; height: 100%; object-fit: cover;
      transform: scaleX(-1); /* mirror for front camera */
    }
    .camera-hud {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: space-between;
      padding: 40px 24px;
      pointer-events: none;
    }
    .shot-indicator {
      display: flex; gap: 12px;
    }
    .shot-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4);
      transition: all 0.3s;
    }
    .shot-dot.taken { background: var(--gold); border-color: var(--gold); }
    .shot-dot.active { background: #fff; border-color: #fff; transform: scale(1.3); }

    .countdown-ring {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      display: none;
    }
    .countdown-ring.visible { display: block; }
    .countdown-num {
      font-size: 160px; font-weight: 900; color: #fff;
      text-shadow: 0 0 60px rgba(0,0,0,0.8);
      line-height: 1; text-align: center;
      animation: countPop 1s ease-out;
    }
    @keyframes countPop {
      0% { transform: scale(1.4); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }

    .flash-overlay {
      position: absolute; inset: 0; background: #fff;
      opacity: 0; pointer-events: none;
      transition: opacity 0.05s;
    }
    .flash-overlay.flash { opacity: 1; transition: opacity 0.05s; }

    .camera-bottom {
      font-size: 13px; color: rgba(255,255,255,0.5);
      letter-spacing: 3px; text-transform: uppercase;
      text-align: center;
    }

    /* ── REVIEW SCREEN ───────────────────────────── */
    #screen-review {
      background: var(--dark);
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 40px;
    }

    /* Strip preview */
    .strip-preview {
      background: #fff;
      padding: 12px 12px 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      display: flex; flex-direction: column; gap: 6px;
      align-items: center;
      max-height: 85vh;
    }
    .strip-photo {
      width: 200px; height: 150px; object-fit: cover;
      display: block;
    }
    .strip-footer {
      text-align: center; padding-top: 8px;
      font-family: Georgia, serif;
    }
    .strip-names { font-size: 13px; font-weight: 700; letter-spacing: 2px; color: #1a1a1a; }
    .strip-married { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #999; margin-top: 2px; }
    .strip-reception { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #c9a84c; margin-top: 1px; }

    /* Review actions */
    .review-actions { display: flex; flex-direction: column; gap: 16px; align-items: center; }
    .review-actions h2 { font-size: 28px; font-weight: 300; color: #fff; text-align: center; line-height: 1.3; }
    .review-actions h2 strong { font-weight: 800; display: block; }
    .btn-print {
      background: var(--gold); color: #000;
      font-size: 18px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
      border: none; border-radius: 999px; padding: 20px 48px;
      cursor: pointer; width: 240px;
    }
    .btn-retake {
      background: transparent; color: #555;
      font-size: 14px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
      border: 1px solid #333; border-radius: 999px; padding: 14px 40px;
      cursor: pointer; width: 240px;
    }
    .btn-retake:hover { color: #fff; border-color: #555; }

    /* ── PRINTING SCREEN ─────────────────────────── */
    #screen-printing { text-align: center; }
    .printing-icon { font-size: 64px; margin-bottom: 24px; animation: printBounce 1s ease-in-out infinite; }
    @keyframes printBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    #screen-printing h2 { font-size: 36px; font-weight: 300; color: #fff; margin-bottom: 8px; }
    #screen-printing p { font-size: 14px; color: #555; letter-spacing: 2px; text-transform: uppercase; }
    .print-progress { width: 240px; height: 4px; background: #222; border-radius: 99px; margin: 32px auto 0; overflow: hidden; }
    .print-progress-bar { height: 100%; background: var(--gold); width: 0%; border-radius: 99px; animation: printProgress 45s linear forwards; }
    @keyframes printProgress { 0%{width:0%} 100%{width:100%} }

    /* ── DONE SCREEN ─────────────────────────────── */
    #screen-done { text-align: center; padding: 40px; }
    .done-icon { font-size: 80px; margin-bottom: 24px; }
    #screen-done h2 { font-size: 42px; font-weight: 300; color: #fff; margin-bottom: 12px; }
    #screen-done h2 strong { font-weight: 800; color: var(--gold); }
    #screen-done p { font-size: 15px; color: #555; margin-bottom: 48px; letter-spacing: 1px; }
    .countdown-reset { font-size: 13px; color: #333; letter-spacing: 3px; text-transform: uppercase; margin-top: 24px; }
    .countdown-reset span { color: var(--gold); }

    /* Hidden canvas for compositing */
    #canvas { display: none; }
  </style>
</head>
<body>

<!-- IDLE -->
<div class="screen active" id="screen-idle">
  <div class="idle-rings">💍</div>
  <div class="idle-title">Sam <span style="color:var(--gold)">&</span> Anna</div>
  <div class="gold-rule"></div>
  <div class="idle-dates">
    <div class="idle-date-row">6/26/26</div>
  </div>
  <button class="tap-btn" onclick="startBooth()">TAP TO START</button>
  <div class="idle-sub">3 photos · instant print</div>
</div>

<!-- CAMERA -->
<div class="screen" id="screen-camera">
  <video id="video" autoplay playsinline muted></video>
  <div class="camera-hud">
    <div class="shot-indicator">
      <div class="shot-dot active" id="dot-0"></div>
      <div class="shot-dot" id="dot-1"></div>
      <div class="shot-dot" id="dot-2"></div>
    </div>
    <div class="countdown-ring" id="countdown-ring">
      <div class="countdown-num" id="countdown-num">3</div>
    </div>
    <div class="camera-bottom" id="camera-status">Get ready!</div>
  </div>
  <div class="flash-overlay" id="flash-overlay"></div>
</div>

<!-- REVIEW -->
<div class="screen" id="screen-review">
  <div class="strip-preview" id="strip-preview">
    <img class="strip-photo" id="strip-img-0" src="">
    <img class="strip-photo" id="strip-img-1" src="">
    <img class="strip-photo" id="strip-img-2" src="">
    <div class="strip-footer">
      <div class="strip-names">Sam &amp; Anna</div>
      <div class="strip-married">6/26/26</div>
    </div>
  </div>
  <div class="review-actions">
    <h2>Looking<br><strong>good?</strong></h2>
    <button class="btn-print" onclick="printStrip()">🖨️ Print It!</button>
    <button class="btn-retake" onclick="retake()">Retake</button>
  </div>
</div>

<!-- PRINT SCREEN -->
<div class="screen" id="screen-print">
  <img id="strip-fullscreen" src="" style="max-height:72vh;max-width:90%;object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,0.6);">
  <div style="margin-top:28px;display:flex;flex-direction:column;align-items:center;gap:14px;">
    <button onclick="shareStrip()" style="background:var(--gold);color:#000;font-size:22px;font-weight:800;letter-spacing:3px;text-transform:uppercase;border:none;border-radius:999px;padding:22px 64px;cursor:pointer;">🖨️ Print</button>
    <button onclick="reprint()" style="background:transparent;color:#555;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border:1px solid #333;border-radius:999px;padding:12px 32px;cursor:pointer;">Print Another Copy</button>
    <button onclick="showDone()" style="background:transparent;color:#444;font-size:12px;letter-spacing:2px;text-transform:uppercase;border:none;padding:8px 20px;cursor:pointer;">Skip →</button>
  </div>
</div>

<!-- DONE -->
<div class="screen" id="screen-done">
  <div class="done-icon">🎉</div>
  <h2>Enjoy your<br><strong>print!</strong></h2>
  <p>Your photos are saved to Sam &amp; Anna's album 📸</p>
  <div class="countdown-reset" style="margin-top:20px;">Starting over in <span id="reset-countdown">10</span>s</div>
</div>

<!-- Hidden print image -->
<img id="print-image" src="" style="display:none;">

<!-- Hidden canvas for compositing the strip -->
<canvas id="canvas"></canvas>

<script>
  // ── State ──────────────────────────────────────────
  let stream = null;
  let capturedPhotos = []; // array of data URLs
  let currentShot = 0;
  const TOTAL_SHOTS = 3;
  const COUNTDOWN_SECS = 3;

  // ── Screen management ──────────────────────────────
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
  }

  // ── Start booth ────────────────────────────────────
  async function startBooth() {
    capturedPhotos = [];
    currentShot = 0;
    resetDots();
    showScreen('camera');
    await startCamera();
    await delay(1000);
    runCaptureSequence();
  }

  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 960 } },
        audio: false
      });
      document.getElementById('video').srcObject = stream;
    } catch (err) {
      console.error('Camera error:', err);
      alert('Camera access needed! Please allow camera access and try again.');
      showScreen('idle');
    }
  }

  function stopCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  }

  // ── Capture sequence ───────────────────────────────
  async function runCaptureSequence() {
    for (let i = 0; i < TOTAL_SHOTS; i++) {
      currentShot = i;
      updateDots(i);
      document.getElementById('camera-status').textContent =
        i === 0 ? 'Get ready!' : `Shot ${i + 1} of ${TOTAL_SHOTS}`;
      await countdown(i === 0 ? 10 : COUNTDOWN_SECS);
      await captureShot(i);
      if (i < TOTAL_SHOTS - 1) await delay(800);
    }
    stopCamera();
    showReview();
  }

  async function countdown(secs) {
    const ring = document.getElementById('countdown-ring');
    const num = document.getElementById('countdown-num');
    ring.classList.add('visible');
    for (let i = secs; i >= 1; i--) {
      num.textContent = i;
      num.style.animation = 'none';
      num.offsetHeight; // reflow
      num.style.animation = 'countPop 1s ease-out';
      await delay(1000);
    }
    ring.classList.remove('visible');
  }

  async function captureShot(index) {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const flash = document.getElementById('flash-overlay');

    // Flash
    flash.classList.add('flash');
    await delay(80);
    flash.classList.remove('flash');

    // Capture frame
    canvas.width = video.videoWidth || 1280;
    canvas.height = video.videoHeight || 960;
    const ctx = canvas.getContext('2d');
    ctx.save();
    ctx.scale(-1, 1); // mirror to match preview
    ctx.drawImage(video, -canvas.width, 0);
    ctx.restore();

    capturedPhotos[index] = canvas.toDataURL('image/jpeg', 0.92);
    document.getElementById(`strip-img-${index}`).src = capturedPhotos[index];
    markDotTaken(index);
  }

  // ── Dots ───────────────────────────────────────────
  function resetDots() {
    for (let i = 0; i < TOTAL_SHOTS; i++) {
      const d = document.getElementById(`dot-${i}`);
      d.classList.remove('taken', 'active');
      if (i === 0) d.classList.add('active');
    }
  }
  function updateDots(current) {
    for (let i = 0; i < TOTAL_SHOTS; i++) {
      const d = document.getElementById(`dot-${i}`);
      d.classList.remove('active');
      if (i === current) d.classList.add('active');
    }
  }
  function markDotTaken(index) {
    const d = document.getElementById(`dot-${index}`);
    d.classList.remove('active');
    d.classList.add('taken');
  }

  // ── Review ─────────────────────────────────────────
  function showReview() {
    showScreen('review');
  }

  function retake() {
    capturedPhotos = [];
    currentShot = 0;
    resetDots();
    showScreen('camera');
    startCamera().then(() => {
      setTimeout(runCaptureSequence, 1000);
    });
  }

  // ── Build composite strip ──────────────────────────
  async function buildStrip() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // 4x6 at 300dpi = 1200x1800px
    const W = 1200, H = 1800;
    canvas.width = W; canvas.height = H;

    const HEADER_H = 220;
    const FOOTER_H = 180;
    const PHOTO_PAD = 24;
    const PHOTO_AREA_TOP = HEADER_H;
    const PHOTO_AREA_H = H - HEADER_H - FOOTER_H;
    const PHOTO_W2 = W;
    const PHOTO_H2 = Math.floor((PHOTO_AREA_H - PHOTO_PAD * 4) / 3);

    // ── Full background: sage ──
    ctx.fillStyle = '#424842';
    ctx.fillRect(0, 0, W, H);

    // ── Header (cream) ──
    ctx.fillStyle = '#faf8f4';
    ctx.fillRect(0, 0, W, HEADER_H);

    // ── Footer (cream) ──
    ctx.fillStyle = '#faf8f4';
    ctx.fillRect(0, H - FOOTER_H, W, FOOTER_H);

    // Header bottom border
    ctx.strokeStyle = '#e0d8cc';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, HEADER_H);
    ctx.lineTo(W, HEADER_H);
    ctx.stroke();

    // Footer top border
    ctx.beginPath();
    ctx.moveTo(0, H - FOOTER_H);
    ctx.lineTo(W, H - FOOTER_H);
    ctx.stroke();

    // ── Header text ──
    ctx.textAlign = 'center';
    ctx.font = '400 90px Georgia, serif';
    // Measure for gold ampersand
    const samW = ctx.measureText('Sam ').width;
    const ampW = ctx.measureText('& ').width;
    const fullW = ctx.measureText('Sam & Anna').width;
    const nameY = 136;
    const startX = W/2 - fullW/2;
    ctx.textAlign = 'left';
    ctx.fillStyle = '#1a1a1a';
    ctx.fillText('Sam ', startX, nameY);
    ctx.fillStyle = '#c9a84c';
    ctx.fillText('&', startX + samW, nameY);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillText(' Anna', startX + samW + ampW, nameY);

    // Gold rule
    ctx.strokeStyle = '#c9a84c';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(W/2 - 60, 164);
    ctx.lineTo(W/2 + 60, 164);
    ctx.stroke();

    // Date
    ctx.fillStyle = '#999999';
    ctx.textAlign = 'center';
    ctx.font = '400 48px Helvetica Neue, Arial, sans-serif';
    ctx.fillText('6/26/26', W/2, 202);

    // ── Photos ──
    for (let i = 0; i < 3; i++) {
      const img = new Image();
      img.src = capturedPhotos[i];
      await new Promise(r => { img.onload = r; });
      const y = PHOTO_AREA_TOP + PHOTO_PAD + i * (PHOTO_H2 + PHOTO_PAD);
      const srcAspect = img.width / img.height;
      const dstAspect = PHOTO_W2 / PHOTO_H2;
      let sx = 0, sy = 0, sw = img.width, sh = img.height;
      if (srcAspect > dstAspect) {
        sw = img.height * dstAspect;
        sx = (img.width - sw) / 2;
      } else {
        sh = img.width / dstAspect;
        sy = (img.height - sh) / 2;
      }
      ctx.drawImage(img, sx, sy, sw, sh, 0, y, PHOTO_W2, PHOTO_H2);
    }

    // ── Footer text ──
    const footerY = H - FOOTER_H;
    ctx.strokeStyle = '#c9a84c';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(W/2 - 50, footerY + 44);
    ctx.lineTo(W/2 + 50, footerY + 44);
    ctx.stroke();

    ctx.fillStyle = '#aaaaaa';
    ctx.textAlign = 'center';
    ctx.font = 'italic 36px Georgia, serif';
    ctx.fillText('— something meaningful goes here —', W/2, footerY + 112);

    // Corner ornaments
    ctx.fillStyle = 'rgba(201,168,76,0.4)';
    ctx.font = '36px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('✦', 24, 60);
    ctx.textAlign = 'right';
    ctx.fillText('✦', W - 24, 60);
    ctx.textAlign = 'left';
    ctx.fillText('✦', 24, H - 24);
    ctx.textAlign = 'right';
    ctx.fillText('✦', W - 24, H - 24);

    return canvas.toDataURL('image/jpeg', 0.95);
  }

  // ── Upload individual photos + strip to Drive ────────
  async function uploadToDrive(stripDataUrl) {
    const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    const formData = new FormData();
    formData.append('name', 'Photo Booth');

    // Upload 3 individual photos
    for (let i = 0; i < capturedPhotos.length; i++) {
      const blob = await (await fetch(capturedPhotos[i])).blob();
      formData.append('photos', blob, `booth-${timestamp}-photo${i+1}.jpg`);
    }

    // Also upload the composite strip
    const stripBlob = await (await fetch(stripDataUrl)).blob();
    formData.append('photos', stripBlob, `booth-${timestamp}-strip.jpg`);

    fetch('/upload', { method: 'POST', body: formData }).catch(console.error);
  }

  // ── Print ──────────────────────────────────────────
  let lastStripDataUrl = null;

  async function printStrip() {
    try {
      lastStripDataUrl = await buildStrip();
      uploadToDrive(lastStripDataUrl); // fire and forget
      document.getElementById('strip-fullscreen').src = lastStripDataUrl;
      showScreen('print');
    } catch (err) {
      console.error('Print error:', err);
      showDone();
    }
  }

  async function shareStrip() {
    if (!lastStripDataUrl) return;
    await printImage(lastStripDataUrl);
    // Auto-reset to done screen after print is triggered
    setTimeout(showDone, 3000);
  }

  async function reprint() {
    if (!lastStripDataUrl) return;
    printImage(lastStripDataUrl);
  }

  async function printImage(dataUrl) {
    // Upload strip to server, navigate THIS page to print URL
    // so only the image exists when print dialog fires
    const blob = await (await fetch(dataUrl)).blob();
    const formData = new FormData();
    formData.append('strip', blob, 'strip.jpg');
    const res = await fetch('/booth-strip', { method: 'POST', body: formData });
    const data = await res.json();
    if (data.url) {
      window.location.href = data.url;
    }
  }

  // ── Done screen ────────────────────────────────────
  function showDone() {
    showScreen('done');
    let secs = 10;
    document.getElementById('reset-countdown').textContent = secs;
    const timer = setInterval(() => {
      secs--;
      document.getElementById('reset-countdown').textContent = secs;
      if (secs <= 0) {
        clearInterval(timer);
        showScreen('idle');
      }
    }, 1000);
  }

  // ── Utils ──────────────────────────────────────────
  function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
